<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <filter id="roughEdge3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.3" numOctaves="3" stitchTiles="stitch" result="t" />
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  
  <!-- Main heart shape - mimics exact yellow heart -->
  <!-- Left lobe -->
  <path d="M 30 25 C 15 15 10 25 10 35 C 10 50 20 60 35 70"
        fill="none"
        stroke="#FF3399"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#roughEdge3)"
        opacity="1" />
  
  <!-- Right lobe -->
  <path d="M 70 25 C 85 15 90 25 90 35 C 90 50 80 60 65 70"
        fill="none"
        stroke="#FF3399"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#roughEdge3)"
        opacity="1" />
  
  <!-- Middle valley connection -->
  <path d="M 35 70 Q 50 60 65 70"
        fill="none"
        stroke="#FF3399"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#roughEdge3)"
        opacity="1" />
  
  <!-- Bottom point -->
  <path d="M 50 70 L 50 105"
        fill="none"
        stroke="#FF3399"
        stroke-width="8"
        stroke-linecap="round"
        filter="url(#roughEdge3)"
        opacity="1" />
  
  <!-- Bottom drip/tail -->
  <path d="M 50 105 Q 45 115 50 125"
        stroke="#FF3399"
        stroke-width="5"
        stroke-linecap="round"
        fill="none"
        opacity="1" />
</svg>